version: '3.8'

services:
  app:
    build: .
    container_name: laravel-app2
    volumes:
      - .:/var/www
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: laravel-db2
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
    ports:
      - "3306:3306"
  
  nginx:
    image: nginx:latest
    container_name: laravel-nginx2
    ports:
      - "7000:80"
    volumes:
      - /mnt/c/Users/Administrator/project/dbms:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    user: "0:0"
    depends_on:
      - app